name: CLI CI

on:
  pull_request:
    branches: [main]
    paths:
      - "cli/**"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: cli/package-lock.json

      - name: Install dependencies
        working-directory: cli
        run: npm ci

      - name: Build
        working-directory: cli
        run: npm run build

      # Uncomment when tests are added:
      # - name: Test
      #   working-directory: cli
      #   run: npm test
