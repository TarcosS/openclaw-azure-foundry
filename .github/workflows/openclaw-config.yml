name: Update OpenClaw Config

on:
  push:
    branches: [main]
    paths:
      - 'openclaw-config/**'
      - '.github/workflows/openclaw-config.yml'
  workflow_dispatch:

jobs:
  update-config:
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Push Config and Restart
        run: |
          set -euo pipefail

          RG=$(az deployment sub list --query "[?properties.provisioningState=='Succeeded' && properties.outputs.resourceGroupName.value!=null] | [0].properties.outputs.resourceGroupName.value" -o tsv)
          VM=$(az deployment sub list --query "[?properties.provisioningState=='Succeeded' && properties.outputs.vmName.value!=null] | [0].properties.outputs.vmName.value" -o tsv)
          KV=$(az deployment sub list --query "[?properties.provisioningState=='Succeeded' && properties.outputs.keyVaultName.value!=null] | [0].properties.outputs.keyVaultName.value" -o tsv)

          if [ -z "$RG" ] || [ -z "$VM" ] || [ -z "$KV" ]; then
            echo "Failed to resolve RG/VM/KeyVault from latest successful deployment outputs"
            exit 1
          fi

          echo "Resolved: RG=$RG VM=$VM KV=$KV"

          AI_SERVICES_NAME=$(az resource list -g "$RG" --resource-type Microsoft.CognitiveServices/accounts --query "[?kind=='AIServices'].name | [0]" -o tsv)
          if [ -z "$AI_SERVICES_NAME" ]; then
            echo "Failed to resolve AI Services account name in resource group $RG"
            exit 1
          fi

          echo "AI Services: $AI_SERVICES_NAME"

          # Build config templates on the runner (replace non-secret placeholders)
          OPENCLAW_CONFIG=$(cat openclaw-config/openclaw.template.json)
          OPENCLAW_CONFIG=${OPENCLAW_CONFIG//FOUNDRY_ACCOUNT_NAME/$AI_SERVICES_NAME}
          OPENCLAW_CONFIG=${OPENCLAW_CONFIG//ADMIN_USERNAME/openclaw}

          AUTH_PROFILES=$(cat openclaw-config/auth-profiles.template.json)

          OPENCLAW_CONFIG_B64=$(printf '%s' "$OPENCLAW_CONFIG" | base64 -w0)
          AUTH_PROFILES_B64=$(printf '%s' "$AUTH_PROFILES" | base64 -w0)

          # Write a self-contained VM script to avoid nested shell quoting issues.
          # Secrets are fetched on-VM via managed identity (Key Vault has no public access).
          cat > /tmp/vm-setup.sh << 'VMSCRIPT'
          #!/bin/bash
          set -euo pipefail

          KV_NAME="__KV__"
          CONFIG_B64="__CONFIG_B64__"
          AUTH_B64="__AUTH_B64__"

          az login --identity --allow-no-subscriptions

          FOUNDRY_API_KEY=$(az keyvault secret show --vault-name "$KV_NAME" --name foundry-api-key --query value -o tsv)
          TELEGRAM_BOT_TOKEN=$(az keyvault secret show --vault-name "$KV_NAME" --name telegram-bot-token --query value -o tsv)

          if [ -z "$FOUNDRY_API_KEY" ] || [ -z "$TELEGRAM_BOT_TOKEN" ]; then
            echo "ERROR: Failed to retrieve secrets from Key Vault $KV_NAME"
            exit 1
          fi

          mkdir -p /home/openclaw/.openclaw/agents/main/agent
          echo "$CONFIG_B64" | base64 -d > /home/openclaw/.openclaw/openclaw.json
          echo "$AUTH_B64" | base64 -d > /home/openclaw/.openclaw/agents/main/agent/auth-profiles.json

          jq --arg key "$FOUNDRY_API_KEY" --arg bot "$TELEGRAM_BOT_TOKEN" '
            .models.providers["azure-openai-responses"].apiKey = $key |
            .models.providers["azure-openai-responses"].headers["api-key"] = $key |
            .channels.telegram.botToken = $bot
          ' /home/openclaw/.openclaw/openclaw.json > /tmp/openclaw.json && mv /tmp/openclaw.json /home/openclaw/.openclaw/openclaw.json

          jq --arg key "$FOUNDRY_API_KEY" '
            .profiles["azure-openai-responses:default"].key = $key
          ' /home/openclaw/.openclaw/agents/main/agent/auth-profiles.json > /tmp/auth-profiles.json && mv /tmp/auth-profiles.json /home/openclaw/.openclaw/agents/main/agent/auth-profiles.json

          chown -R openclaw:openclaw /home/openclaw/.openclaw

          # Always use systemctl to ensure the service comes back even if it was stopped/crashed
          systemctl restart openclaw
          sleep 5
          systemctl is-active openclaw

          OPENCLAW_BIN=/home/openclaw/.npm-global/bin/openclaw
          if [ -x "$OPENCLAW_BIN" ]; then
            sudo -u openclaw "$OPENCLAW_BIN" status
          fi
          VMSCRIPT

          # Inject actual values into the script
          sed -i "s|__KV__|$KV|g" /tmp/vm-setup.sh
          sed -i "s|__CONFIG_B64__|$OPENCLAW_CONFIG_B64|g" /tmp/vm-setup.sh
          sed -i "s|__AUTH_B64__|$AUTH_PROFILES_B64|g" /tmp/vm-setup.sh

          # Base64 encode the entire script for safe transport
          SCRIPT_B64=$(base64 -w0 /tmp/vm-setup.sh)

          az vm run-command invoke \
            --resource-group "$RG" \
            --name "$VM" \
            --command-id RunShellScript \
            --scripts "echo '$SCRIPT_B64' | base64 -d | bash"
